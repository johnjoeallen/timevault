# Example configuration for Timevault.
# Backup disks are enrolled by filesystem UUID and stay offline by default.

# job run policy: auto | demand | off
mountBase: "/run/timevault/mounts"
userMountBase: "/run/timevault/user-mounts"
backupDisks:
  - diskId: "primary"
    fsUuid: "REPLACE-WITH-UUID"
    label: "primary-backup"
    mountOptions: "rw,nodev,nosuid,noexec"
    # disabled: true    # hard stop: never use this disk for backups
    # rotatedOut: true  # skip automatic backups, but allow explicit --disk-id runs
excludes:
  - "/backups"
  - "/proc"
  - "/var/run"
  - "/var/log"
  - "/var/tmp"
  - "/tmp"
  - "/mnt"
  - "/net"
  - "/dev"
  - "/initrd"
  - "/var/lib/imap/proc"
  - "/var/spool/postfix/active"
  - "/var/spool/postfix/defer"
  - "/var/spool/postfix/deferred"
  - "/var/spool/postfix/maildrop"
  - "/var/spool/squid"
  - "/var/cache"
  - "/sys"
  - "/data/docker"
  - "/data/mirrors"
  - "/data/swapfile"
  - "/data/venomsoft"
  - "/data/pub/backups"
  - "/media"
  - ".thumbnails"
  - "/run"
  - "/root/tmp"
options:
  cascade: false
  exclude-pristine: false
  verbose: false
  safe: false
  # Optional HTML backup report email, sent from "Timevault".
  # report:
  #   emailTo: "admin@example.com"
  #   emailFrom: "timevault@example.com"
  #   sendmail: "/usr/sbin/sendmail"
  rsync:
    - "--one-file-system"

jobs:
  - name: "primary"
    description: "Primary filesystem"
    source: "/"
    copies: 30
    run: "auto"
    # Optional hooks are discovered from /etc/timevault/scripts/primary.pre
    # and /etc/timevault/scripts/primary.post.
    # Optional disk allowlist for this job:
    # diskIds: ["primary"]
    excludes: []
  - name: "remote-primary"
    description: "Remote primary filesystem"
    source: "root@example.com:/"
    copies: 30
    run: "auto"
    # For SSH sources, matching hooks on root@example.com are also run from
    # /etc/timevault/scripts/remote-primary.pre and .post.
    # Optional remote power handling:
    # remote:
    #   inhibitSuspend: true
    #   wake:
    #     mac: "aa:bb:cc:dd:ee:ff"
    #     host: "example.com"
    #     broadcast: "192.0.2.255"
    #     interface: "eth0"
    #     port: 9
    #     keepaliveSeconds: 60
    #     waitSeconds: 15
    #     suspendAfterBackup: true
    excludes: []
